<svg width="350" height="450" viewBox="0 0 350 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="1"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <linearGradient id="cedula-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bbdefb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hologram-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.1" />
      <stop offset="50%" style="stop-color:#00e5ff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#fff;stop-opacity:0.1" />
    </linearGradient>
    <pattern id="guilloche-pattern" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M0 10 L10 0 M5 15 L15 5 M-5 5 L5 -5" stroke="#90caf9" stroke-width="0.1" fill="none"/>
    </pattern>

    <linearGradient id="digital-cedula-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f4f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ovi-butterfly-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2e7d32;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0277bd;stop-opacity:0.8" />
    </linearGradient>
    <pattern id="butterfly-pattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M10 10 Q 15 5, 20 10 Q 25 15, 15 20 Q 5 15, 10 10" fill="#e1f5fe" opacity="0.4"/>
    </pattern>
  </defs>

  <g transform="translate(45, 20)" filter="url(#soft-shadow)">
    <rect width="230" height="150" rx="10" fill="url(#cedula-gradient)" stroke="#bdc3c7" stroke-width="1"/>
    <rect width="230" height="150" rx="10" fill="url(#guilloche-pattern)"/>
    
    <g transform="translate(75, 35)" opacity="0.1" fill="#aabb00">
      <circle cx="40" cy="40" r="35"/>
      <path d="M20 40 L 60 40 M 40 20 L 40 60" stroke="#aabb00" stroke-width="5"/>
    </g>

    <g font-family="sans-serif" fill="#263238">
      <text x="15" y="20" font-size="7" font-weight="bold">REPUBLICA DE COLOMBIA</text>
      <text x="15" y="28" font-size="6">IDENTIFICACION PERSONAL</text>
      <text x="15" y="36" font-size="6">CEDULA DE CIUDADANIA</text>
      <text x="15" y="55" font-size="5" fill="#546e7a">NUMERO</text>
      <text x="40" y="55" font-size="10" font-weight="bold">9.999.999.999</text>
      <text x="15" y="75" font-size="5" fill="#546e7a">APELLIDOS</text>
      <text x="15" y="85" font-size="9" font-weight="bold">APELLIDO1 APELLIDO2</text>
      <text x="15" y="105" font-size="5" fill="#546e7a">NOMBRES</text>
      <text x="15" y="115" font-size="9" font-weight="bold">NOMBRE1 NOMBRE2</text>
    </g>

    <g transform="translate(25, 130)">
      <path d="M0 0 C 10 -5, 20 5, 30 0 C 40 -5, 50 5, 60 0" stroke="#263238" stroke-width="1.5" fill="none"/>
      <text x="30" y="10" font-size="5" fill="#546e7a" text-anchor="middle">FIRMA</text>
    </g>
    
    <g transform="translate(145, 30)">
      <rect width="70" height="90" rx="5" fill="#cfd8dc" stroke="#b0bec5" stroke-width="0.5"/>
      <g fill="#78909c">
          <ellipse cx="35" cy="35" rx="18" ry="22"/>
          <path d="M5 90 C 5 65, 20 60, 35 60 C 50 60, 65 65, 65 90 Z"/>
          <path d="M25 90 L 35 70 L 45 90 Z" fill="#cfd8dc"/> 
      </g>
      <rect width="70" height="90" rx="5" fill="url(#hologram-gradient)" opacity="0.3"/>
    </g>
  </g>

  <g transform="translate(45, 200)" filter="url(#soft-shadow)">
    <rect width="230" height="150" rx="10" fill="url(#digital-cedula-bg)" stroke="#bdc3c7" stroke-width="0.5"/>
    <rect width="230" height="150" rx="10" fill="url(#butterfly-pattern)"/>

    <g font-family="sans-serif">
      <g transform="translate(10, 10)">
        <rect width="12" height="4" fill="#fdd835"/>
        <rect y="4" width="12" height="2" fill="#0044ff"/>
        <rect y="6" width="12" height="2" fill="#d50000"/>
        <text x="15" y="4" font-size="4" font-weight="bold" fill="#37474f">CÉDULA DE</text>
        <text x="15" y="9" font-size="4" font-weight="bold" fill="#37474f">CIUDADANÍA</text>
      </g>
      <text x="220" y="15" font-size="9" font-weight="bold" fill="#b71c1c" text-anchor="end">REPÚBLICA DE COLOMBIA</text>
    </g>

    <g transform="translate(15, 30)">
      <rect width="65" height="85" rx="4" fill="#cfd8dc"/>
      <g fill="#90a4ae">
        <ellipse cx="32.5" cy="35" rx="18" ry="22"/>
        <path d="M5 85 C 5 60, 20 55, 32.5 55 C 45 55, 60 60, 60 85 Z"/>
      </g>
    </g>

    <g transform="translate(90, 30)" font-family="sans-serif" fill="#37474f">
      <text x="135" y="5" font-size="6" fill="#546e7a" text-anchor="end">NUIP</text>
      <text x="135" y="15" font-size="10" font-weight="bold" text-anchor="end">1.234.567.890</text>
      <text x="0" y="25" font-size="5" fill="#546e7a">Apellidos</text>
      <text x="0" y="33" font-size="8" font-weight="bold">MARTÍNEZ GARCÍA</text>
      <text x="0" y="43" font-size="5" fill="#546e7a">Nombres</text>
      <text x="0" y="51" font-size="8" font-weight="bold">MARIA DANIELA</text>
      <g transform="translate(0, 62)" font-size="5">
        <text fill="#546e7a">Nacionalidad</text>
        <text y="7" font-weight="bold">COL</text>
        <text x="45" fill="#546e7a">Estatura</text>
        <text x="45" y="7" font-weight="bold">1.67</text>
        <text x="75" fill="#546e7a">Sexo</text>
        <text x="75" y="7" font-weight="bold">F</text>
        <text y="16" fill="#546e7a">Fecha de nacimiento</text>
        <text y="23" font-weight="bold">21 AGO 1988</text>
        <text x="65" y="16" fill="#546e7a">G.S. RH</text>
        <text x="65" y="23" font-weight="bold">O+</text>
      </g>
      <g transform="translate(100, 25)" opacity="0.3">
        <rect width="25" height="35" rx="2" fill="#90a4ae"/>
        <circle cx="12.5" cy="12" r="7" fill="#cfd8dc"/>
        <path d="M2 35 Q 12.5 20 23 35" fill="#cfd8dc"/>
      </g>
    </g>

    <g transform="translate(15, 120)">
      <text x="0" y="0" font-size="5" fill="#546e7a">Firma</text>
      <path d="M5 10 C 15 5, 25 15, 35 10 C 45 5, 55 15, 65 10" stroke="#37474f" stroke-width="0.8" fill="none"/>
      <g transform="translate(185, -5)">
        <path d="M10 10 Q 18 -5, 25 10 Q 32 25, 20 30 Q 5 25, 10 10 Z" fill="url(#ovi-butterfly-gradient)"/>
        <text x="15" y="32" font-size="3" fill="#546e7a" text-anchor="middle">SEGURIDAD</text>
      </g>
    </g>
  </g>
</svg>
